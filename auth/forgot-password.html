<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Hustlr</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%232563EB'/><text x='16' y='23' text-anchor='middle' font-size='20' font-weight='900' fill='white' font-family='Arial'>H</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/animations.css">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg-secondary); padding: 20px; }
    .auth-card { width: 100%; max-width: 440px; }
    .back-link { display: flex; align-items: center; gap: 6px; color: var(--text-muted); text-decoration: none; font-size: 0.875rem; margin-bottom: 24px; }
    .back-link:hover { color: var(--primary); }
  </style>
</head>
<body>
<div class="auth-card page-enter">

  <!-- Logo -->
  <div style="text-align:center;margin-bottom:28px;">
    <a href="/" class="nav-logo" style="justify-content:center;font-size:1.5rem;">
      <div class="logo-icon" style="width:48px;height:48px;font-size:1.5rem;">H</div>
      Hustlr
    </a>
  </div>

  <!-- Back -->
  <a href="/auth/login.html" class="back-link">← Back to sign in</a>

  <!-- Card -->
  <div class="card">
    <div id="formView">
      <div style="text-align:center;margin-bottom:24px;">
        <div style="font-size:3rem;margin-bottom:12px;">🔐</div>
        <h2 style="font-size:1.5rem;font-weight:800;margin-bottom:6px;">Reset your password</h2>
        <p style="font-size:0.9375rem;color:var(--text-muted);">Enter your email and we'll send you a link to reset your password.</p>
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="emailInput" class="form-control form-lg" placeholder="you@university.edu.ng" autocomplete="email" required>
      </div>

      <div id="errorMsg" style="display:none;" class="alert alert-danger mb-3"></div>

      <button class="btn btn-primary btn-full btn-lg" id="resetBtn">
        Send Reset Link
      </button>
    </div>

    <!-- Success State -->
    <div id="successView" style="display:none;text-align:center;">
      <div style="font-size:3.5rem;margin-bottom:16px;">📧</div>
      <h2 style="font-size:1.25rem;font-weight:800;margin-bottom:8px;">Check your inbox!</h2>
      <p style="color:var(--text-muted);font-size:0.9375rem;margin-bottom:20px;">
        We've sent a password reset link to <strong id="sentTo"></strong>. Check your spam folder if you don't see it within a few minutes.
      </p>
      <a href="/auth/login.html" class="btn btn-primary btn-full">← Back to Sign In</a>
      <button class="btn btn-ghost btn-full mt-2" id="resendBtn">Resend email</button>
    </div>
  </div>

  <!-- Footer -->
  <div style="text-align:center;margin-top:20px;font-size:0.875rem;color:var(--text-muted);">
    Don't have an account? <a href="/auth/register.html" style="color:var(--primary);font-weight:600;">Sign up free</a>
  </div>

</div>

<div class="toast-container"></div>

<script type="module">
  import { initTheme, showToast } from '/js/app.js';
  import { resetPassword } from '/js/auth.js';

  initTheme();

  const emailInput = document.getElementById('emailInput');
  const resetBtn = document.getElementById('resetBtn');
  const errorMsg = document.getElementById('errorMsg');

  async function doReset() {
    const email = emailInput?.value?.trim();

    if (!email) {
      showError('Please enter your email address.');
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showError('Please enter a valid email address.');
      return;
    }

    resetBtn.disabled = true;
    resetBtn.textContent = 'Sending...';
    hideError();

    const result = await resetPassword(email);

    if (result.success) {
      document.getElementById('formView').style.display = 'none';
      document.getElementById('successView').style.display = 'block';
      document.getElementById('sentTo').textContent = email;

      document.getElementById('resendBtn')?.addEventListener('click', async () => {
        await resetPassword(email);
        showToast('Reset email resent!', 'success');
      });
    } else {
      showError(result.error || 'Failed to send reset email. Please try again.');
      resetBtn.disabled = false;
      resetBtn.textContent = 'Send Reset Link';
    }
  }

  resetBtn?.addEventListener('click', doReset);

  emailInput?.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') doReset();
  });

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
  }

  function hideError() {
    errorMsg.style.display = 'none';
  }
</script>
</body>
</html>
